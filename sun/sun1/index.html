<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>animasi matahari</title>
 <link rel="stylesheet" href="https://mvlrfq.github.io/animasi/sun/sun1/style.css">
</head>
<body>
  <div class="sun-container">
  <svg class="sun-beams" viewBox="0 0 100 100" preserveAspectRatio="none">
    <defs>
      <path id="beam-path" d="M 50,0 C 45,10 55,10 50,20 C 45,30 55,30 50,40" />
    </defs>
    
    <use href="#beam-path" transform="rotate(0 50 50)" />
    <use href="#beam-path" transform="rotate(30 50 50)" />
    <use href="#beam-path" transform="rotate(60 50 50)" />
    <use href="#beam-path" transform="rotate(90 50 50)" />
    <use href="#beam-path" transform="rotate(120 50 50)" />
    <use href="#beam-path" transform="rotate(150 50 50)" />
    <use href="#beam-path" transform="rotate(180 50 50)" />
    <use href="#beam-path" transform="rotate(210 50 50)" />
    <use href="#beam-path" transform="rotate(240 50 50)" />
    <use href="#beam-path" transform="rotate(270 50 50)" />
    <use href="#beam-path" transform="rotate(300 50 50)" />
    <use href="#beam-path" transform="rotate(330 50 50)" />
  </svg>
  
  <div class="sun-core"></div>
</div>
</body>
</html>
